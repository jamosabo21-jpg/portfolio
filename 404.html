<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Redirige a la página principal y maneja la ruta
        const path = window.location.pathname;
        if (path === '/' || path === '/index.html') {
            window.location.href = '/';
        } else {
            // Para rutas como /projects, /contact, etc.
            window.location.href = '/' + path.split('/')[1];
        }
    </script>
</head>
<body>
    <p>Redirecting... <a href="/">Click here if not redirected</a></p>
</body>
</html>
