<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting - JaMo Design</title>
    <script>
        // Redirección inteligente para GitHub Pages
        const path = window.location.pathname;
        if (path === '/' || path === '/index.html') {
            window.location.href = '/';
        } else {
            // Preservar la ruta y redirigir al home
            sessionStorage.setItem('redirectPath', path);
            window.location.href = '/';
        }
    </script>
</head>
<body>
    <p>Redirecting... <a href="/">Click here if not redirected</a></p>
</body>
</html>
