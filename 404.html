<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting - JaMo Design</title>
    <script>
        // Redirección CORREGIDA - usa la ruta actual
        const currentPath = window.location.pathname;
        
        // Solo redirige al home si es necesario
        if (currentPath === '/' || currentPath === '/index.html') {
            window.location.href = '/';
        } else {
            // Guarda la ruta ACTUAL y redirige al home
            sessionStorage.setItem('redirectPath', currentPath);
            window.location.href = '/';
        }
    </script>
</head>
<body>
    <p>Redirecting... <a href="/">Click here if not redirected</a></p>
</body>
</html>
